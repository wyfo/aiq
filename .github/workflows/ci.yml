name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: [--no-default-features, --all-features]
    steps:
      - uses: actions/checkout@v4
      - name: rustfmt
        run: cargo fmt -- --check --config "unstable_features=true,imports_granularity=Crate,group_imports=StdExternalCrate,format_code_in_doc_comments=true"
      - name: clippy
        run: cargo clippy ${{ matrix.features }} --all-targets -- -D warnings
      - name: test
        run: cargo test ${{ matrix.features }}
      - name: check doc
        run: cargo doc
        env:
          RUSTDOCFLAGS: "-Dwarnings"

  loom:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: loom
        run: cargo test --test loom_notify --test loom_semaphore --release
        env:
          RUSTFLAGS: --cfg loom
          LOOM_MAX_PREEMPTIONS: 2

  benchmark:
    needs: test
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: benchmark aiq
        run: cargo bench --all-features --bench notify --bench semaphore -- --warm-up-time 1 --measurement-time 1
      - name: benchmark tokio
        run: cargo bench --all-features --bench tokio_notify --bench tokio_semaphore -- --warm-up-time 1 --measurement-time 1

  miri:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install miri
        run: rustup install nightly && rustup +nightly component add miri
      - name: miri
        run: cargo +nightly miri test --test miri_notify --test miri_semaphore
        env:
          MIRIFLAGS: -Zmiri-many-seeds=0..2048 -Zmiri-compare-exchange-weak-failure-rate=0
